services:
  - type: web
    name: green-yatra-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false

  - type: web
    name: green-yatra-admin
    env: node
    region: singapore
    plan: starter
    buildCommand: cd admin && npm install && npm run build
    startCommand: cd admin && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://green-yatra-backend.onrender.com/api/v1
