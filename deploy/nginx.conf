# Nginx config for production (if self-hosting on VPS)
server {
    listen 80;
    server_name api.greenyatra.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.greenyatra.in;

    ssl_certificate /etc/letsencrypt/live/api.greenyatra.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.greenyatra.in/privkey.pem;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl;
    server_name admin.greenyatra.in;

    ssl_certificate /etc/letsencrypt/live/admin.greenyatra.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.greenyatra.in/privkey.pem;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
